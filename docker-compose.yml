services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: polizas-app
    container_name: polizas-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      TZ: "America/Guayaquil" # <-- 1. Define la zona horaria para PHP y el contenedor
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /etc/localtime:/etc/localtime:ro # <-- 2. Sincroniza el reloj del contenedor con AlmaLinux
    networks:
      - polizas-network

  web:
    image: nginx:alpine
    container_name: polizas-web
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - polizas-network

  db:
    image: mysql:8.0
    container_name: polizas-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: polizas
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - polizas-dbdata:/var/lib/mysql
    networks:
      - polizas-network

networks:
  polizas-network:
    driver: bridge

volumes:
  polizas-dbdata:
    driver: local
